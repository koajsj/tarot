<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#090b1b" />
    <meta name="description" content="一个只属于你的塔罗静心空间" />
    <link rel="icon" href="%BASE_URL%assets/celestial-card-back.jpg" />
    <title>Luna Arcana - 私人塔罗空间</title>
    <style>
      html, body { margin: 0; min-width: 320px; min-height: 100%; background: #080a18; color: #f3f0ea; }
      #app:empty { min-height: 100dvh; display: grid; place-items: center; background: radial-gradient(circle at 50% 42%, #242143 0, #080a18 48%); }
      #app:empty::before { content: '✦'; color: #d8bd7b; font-size: 28px; animation: luna-loading 1.8s ease-in-out infinite; }
      @keyframes luna-loading { 50% { opacity: .35; transform: scale(.82) rotate(45deg); } }
      @media (prefers-reduced-motion: reduce) { #app:empty::before { animation: none; } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
